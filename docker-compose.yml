services:
  backend:
    build: ./backend
    ports:
      - '3001:3001'
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/todo.db

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
    depends_on:
      - backend